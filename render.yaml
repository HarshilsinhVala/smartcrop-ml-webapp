services:
  - type: web
    name: smartcrop-frontend
    env: node
    plan: free
    buildCommand: cd Frontend && npm install --legacy-peer-deps && npm install --save @babel/plugin-proposal-private-property-in-object && CI=false npm run build
    startCommand: cd Frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://smartcrop-backend.onrender.com
      - key: PORT
        value: 3000

  - type: web
    name: smartcrop-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        value: mongodb+srv://Harshil:1234@cluster0.qjabh9e.mongodb.net/?appName=Cluster0
      - key: ML_API_URL
        value: https://smartcrop-ml.onrender.com

  - type: web
    name: smartcrop-ml
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000