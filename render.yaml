services:
  - type: web
    name: smartcrop-frontend
    env: node
    plan: free
    buildCommand: cd Frontend && npm install && npm run build
    startCommand: cd Frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://smartcrop-backend.onrender.com
      - key: PORT
        value: 3000

  - type: web
    name: smartcrop-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        value: your_mongodb_connection_string_here
      - key: ML_API_URL
        value: https://smartcrop-ml.onrender.com

  - type: web
    name: smartcrop-ml
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000